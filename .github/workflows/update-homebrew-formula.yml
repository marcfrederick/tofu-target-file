name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Get release information
        id: release
        run: |
          echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          tag="${{ github.event.release.tag_name }}"
          echo "version=${tag#v}" >> $GITHUB_OUTPUT

      - name: Download and calculate SHA256
        id: sha256
        run: |
          wget -q "https://github.com/marcfrederick/tofu-target-file/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz"
          sha256=$(sha256sum "${{ steps.release.outputs.tag }}.tar.gz" | cut -d' ' -f1)
          echo "sha256=$sha256" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: marcfrederick/homebrew-tap
          path: tap-repo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          fetch-depth: 0

      - name: Update formula
        run: |
          cd tap-repo
          mkdir -p Formula

          cat > Formula/tofu-target-file.rb << 'EOF'
          class TofuTargetFile < Formula
            desc      "A simple shell script that generates target files for OpenTofu."
            homepage "https://github.com/marcfrederick/tofu-target-file"
            url      "https://github.com/marcfrederick/tofu-target-file/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz"
            sha256   "${{ steps.sha256.outputs.sha256 }}"
            license   "GPL-3.0-or-later"
            head      "https://github.com/marcfrederick/tofu-target-file.git", branch: "main"

            depends_on "bash"

            def install
              bin.install "tofu-target-file"
            end

            test do
              assert_predicate bin/"tofu-target-file", :exist?
              assert_predicate bin/"tofu-target-file", :executable?
            end
          end
          EOF

      - name: Commit and push changes
        run: |
          cd tap-repo
          git add Formula/tofu-target-file.rb

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update tofu-target-file formula to ${{ steps.release.outputs.tag }}"
          git push origin HEAD:main
